<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test WebR</title>
    
    <script type="importmap">
    {
        "imports": {
            "webr": "https://webr.r-wasm.org/v0.2.0/webr.mjs"
        }
    }
    </script>
</head>
<body>
    <div style="max-width:800px;margin:50px auto;padding:20px;font-family:Arial;">
        <h1>🧪 Test WebR</h1>
        
        <div id="status" style="padding:15px;background:#f0f0f0;border-radius:8px;margin:10px 0;">
            ⏳ Se încarcă WebR...
        </div>
        
        <div style="margin:20px 0;">
            <label>Introdu date (separate prin virgulă):</label><br>
            <input type="text" id="userInput" value="1,2,3,4,5" style="width:100%;padding:10px;margin:10px 0;border:2px solid #ddd;border-radius:5px;">
            <button id="runButton" style="width:100%;padding:15px;background:#667eea;color:white;border:none;border-radius:5px;font-size:18px;cursor:pointer;">
                🚀 Rulează R
            </button>
        </div>
        
        <div id="result" style="padding:15px;background:#2d2d2d;color:#f8f8f8;border-radius:8px;min-height:100px;white-space:pre-wrap;font-family:'Courier New',monospace;">
            Așteaptă...
        </div>
        
        <div id="plotOutput" style="margin-top:20px;padding:20px;background:#f8f9fa;border-radius:8px;min-height:100px;">
            <p style="color:#666;">Graficul va apărea aici</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
