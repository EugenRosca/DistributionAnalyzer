<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analiză date cu R</title>
    
    <!-- Folosim CDN direct, nu importmap -->
    <script src="https://cdn.jsdelivr.net/npm/webr@0.2.0/dist/webr.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        #runButton {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #runButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #loadingStatus {
            padding: 12px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 8px;
            color: #666;
            font-weight: 500;
            text-align: center;
        }

        #output {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        #result {
            background: #2d2d2d;
            color: #f8f8f8;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 80px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #plotContainer {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        #plotOutput {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        #plotOutput svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Analiză date cu R</h1>
        
        <div class="input-section">
            <label for="userInput">Introdu datele (separate prin virgulă):</label>
            <input type="text" id="userInput" placeholder="ex: 12,45,63,78,43,15,45" value="12,45,63,78,43,15,45">
            <button id="runButton">🚀 Rulează R</button>
        </div>

        <div id="loadingStatus">
            ⏳ Se încarcă WebR...
        </div>

        <div id="output">
            <h3>📊 Rezultat:</h3>
            <pre id="result">Așteaptă rularea...</pre>
        </div>

        <div id="plotContainer">
            <h3>📈 Grafic generat în R:</h3>
            <div id="plotOutput"></div>
        </div>
    </div>

    <!-- Script normal, nu module -->
    <script src="script.js"></script>
</body>
</html>
