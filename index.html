<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicație R cu WebR</title>
    
   
   <!-- Înlocuiți importmap cu acest script -->
<script src="https://webr.r-wasm.org/v0.2.0/webr.js"></script>
<script>
    // Expune WebR global
    window.WebR = WebR;
</script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Analiză date cu R</h1>
        
        <div class="input-section">
            <label for="userInput">Introdu datele (separate prin virgulă):</label>
            <input type="text" id="userInput" placeholder="ex: 12,45,63,78,43,15,45" value="12,45,63,78,43,15,45">
            <button id="runButton">🚀 Rulează R</button>
        </div>

        <div id="loadingStatus">
            ⏳ Se încarcă WebR...
        </div>

        <div id="output">
            <h3>📊 Rezultat:</h3>
            <pre id="result">Așteaptă rularea...</pre>
        </div>

        <div id="plotContainer">
            <h3>📈 Grafic generat în R:</h3>
            <div id="plotOutput"></div>
        </div>
    </div>

    <!-- Folosește type="module" pentru import -->
    <script type="module" src="script.js"></script>
</body>
</html>
